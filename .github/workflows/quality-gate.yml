name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx eslint src/ --max-warnings 0
      - run: npx tsc --noEmit
      - run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  attestation:
    name: Quality Attestation
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan, build]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Generate attestation
        run: |
          cat > quality-gate-report.json << 'ATTEST'
          {
            "project": "ai-tprm-machine",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "jobs": {
              "lint-and-typecheck": "${{ needs.lint-and-typecheck.result }}",
              "security-scan": "${{ needs.security-scan.result }}",
              "build": "${{ needs.build.result }}"
            },
            "overall": "${{ needs.lint-and-typecheck.result == 'success' && needs.build.result == 'success' && 'pass' || 'fail' }}"
          }
          ATTEST
      - uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: quality-gate-report.json
